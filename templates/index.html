<!DOCTYPE html>
<html>
<head>
    <title>Pic2Video</title>
</head>
<body>
    <h1>Make a Video from Your Picture</h1>
    <form action="/render" method="POST" enctype="multipart/form-data">
        <label>Upload Image:</label>
        <input type="file" name="image" required><br><br>

        <label>Description (optional):</label>
        <input type="text" name="description"><br><br>

        <label>Seconds per Image:</label>
        <input type="number" name="seconds" value="3"><br><br>

        <label>Music (optional):</label>
        <input type="file" name="music"><br><br>

        <button type="submit">Create Video</button>
    </form>
</body>
</html>
